version: "3.9"

services:
  # ------------------------------------------------------------
  # 1. PostgreSQL (источник данных)
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cbrf_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbrf_user
      POSTGRES_PASSWORD: cbrf_pass
      POSTGRES_DB: cbrf_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    # Для Debezium необходимо включить логическую репликацию
    command: |
      postgres
      -c wal_level=logical
      -c max_wal_senders=5
      -c max_replication_slots=5

  # ------------------------------------------------------------
  # 2. Zookeeper (для Kafka)
  # ------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ------------------------------------------------------------
  # 3. Kafka
  # ------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # ------------------------------------------------------------
  # 4. Kafka Connect с Debezium (CDC)
  # ------------------------------------------------------------
  connect:
    image: debezium/connect:2.6
    container_name: debezium_connect
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets_v4
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_PLUGIN_PATH: /kafka/connect

  # ------------------------------------------------------------
  # 5. MinIO (S3-совместимое хранилище)
  # ------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Web-консоль
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # ------------------------------------------------------------
  # 6. Nessie (каталог для Apache Iceberg с поддержкой S3)
  # ------------------------------------------------------------
  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.5
    container_name: nessie
    restart: unless-stopped
    depends_on:
      - minio
    ports:
      - "19120:19120"
    environment:
      quarkus.otel.sdk.disabled: true
      quarkus.oidc.enabled: false
      nessie.version.store.type: IN_MEMORY

      nessie.catalog.default-warehouse: warehouse
      nessie.catalog.warehouses.warehouse.location: s3://iceberg-warehouse
      nessie.catalog.warehouses.warehouse.iceberg-rest.enabled: true

      # Склад получает собственные S3-настройки и ссылку на секрет
      nessie.catalog.warehouses.warehouse.s3.endpoint: http://minio:9000
      nessie.catalog.warehouses.warehouse.s3.path-style-access: "true"
      nessie.catalog.warehouses.warehouse.s3.region: us-east-1
      nessie.catalog.warehouses.warehouse.s3.auth-type: STATIC
      nessie.catalog.warehouses.warehouse.s3.access-key: urn:nessie-secret:quarkus:my-s3-credentials

      # Глобальные настройки (на случай других сервисов) тоже с секретом
      nessie.catalog.service.s3.default-options.endpoint: http://minio:9000
      nessie.catalog.service.s3.default-options.path-style-access: "true"
      nessie.catalog.service.s3.default-options.region: us-east-1
      nessie.catalog.service.s3.default-options.auth-type: STATIC
      nessie.catalog.service.s3.default-options.access-key: urn:nessie-secret:quarkus:my-s3-credentials

      # Определение самого секрета
      nessie.catalog.secrets.my-s3-credentials.name: minioadmin
      nessie.catalog.secrets.my-s3-credentials.secret: minioadmin

  trino:
    image: trinodb/trino:latest
    container_name: trino
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    mem_reservation: 2g
    mem_limit: 4g

volumes:
  pg_data:
  minio_data: